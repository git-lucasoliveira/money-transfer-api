server.port=8080
spring.application.name=money-transfer-api

# Conexao com o Postgres
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/money_transfer_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# JPA - validate garante que o schema bate com as entidades, mas nao altera nada
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway - gerencia as migracoes do banco
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-dev}
spring.flyway.baseline-on-migrate=true
